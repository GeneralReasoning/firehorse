name: "Firehorse: Publish to PyPI"

on:
  push:
    branches:
      - "main"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.6"
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - name: uv sync
        run: uv sync --extra dev --extra react --extra resum
      - name: uv run pytest
        run: uv run pytest -m "not integration"

  version-check:
    name: Check version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check version is bumped
        uses: ./.github/workflows/check-pypi-version-bump
        with:
          pyproject-path: pyproject.toml
          package-name: firehorse-cli

  publish-to-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [version-check, run-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.6"
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - name: uv sync
        run: uv sync
      - name: Build
        run: uv build

      - name: Publish
        id: publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_KEY }}
        run: |
          uv publish
          VERSION=$(python3 -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit
        run: |
          {
            echo 'message<<COMMIT_MSG_EOF'
            git log -1 --pretty=%B
            echo 'COMMIT_MSG_EOF'
          } >> $GITHUB_OUTPUT

      - name: Notify Slack
        id: slack_notify
        uses: slackapi/slack-github-action@v3
        env:
          PKG_VERSION: ${{ steps.publish.outputs.version }}
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0ARJ2MFR7W",
              "text": ":fire: firehorse-cli version `${{ env.PKG_VERSION }}` <https://pypi.org/project/firehorse-cli/${{ env.PKG_VERSION }}/|published to PyPI>",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":fire: firehorse-cli version `${{ env.PKG_VERSION }}` <https://pypi.org/project/firehorse-cli/${{ env.PKG_VERSION }}/|published to PyPI>"
                  }
                }
              ]
            }

      - name: Post changes in thread
        uses: slackapi/slack-github-action@v3
        env:
          COMMIT_MESSAGE: ${{ steps.commit.outputs.message }}
          THREAD_TS: ${{ fromJson(steps.slack_notify.outputs.response).ts }}
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C09FUFSGLP6",
              "thread_ts": ${{ toJSON(env.THREAD_TS) }},
              "text": ${{ toJSON(env.COMMIT_MESSAGE) }}
            }

  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    if: failure()
    needs: [run-tests, version-check, publish-to-pypi]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/workflows/notify-on-build-failure
        with:
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
